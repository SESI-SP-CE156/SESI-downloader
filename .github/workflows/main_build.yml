name: Build & Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===================================================
  # JOB 1: BUILD (Matriz Windows e Linux)
  # ===================================================
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true # MANTIDO: Essencial para baixar os binários reais (ffmpeg/yt-dlp)

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # --- DEPENDÊNCIAS DO LINUX ---
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsqlite3-dev libfuse2 imagemagick

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Update pubspec.yaml version
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            powershell -Command "(Get-Content pubspec.yaml) -replace '^version: .*', 'version: 1.0.${{ github.run_number }}' | Set-Content pubspec.yaml"
          else
            sed -i 's/^version: .*/version: 1.0.${{ github.run_number }}/g' pubspec.yaml
          fi

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      # --- BUILD LINUX ---
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --release

      # --- NOVO PACOTE APPIMAGE (Baseado no Corretor Desktop) ---
      - name: Package as AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Cria a estrutura base do AppDir
          mkdir -p AppDir
          mkdir -p AppDir/usr/lib

          # 2. Copia o sqlite do sistema renomeando para o que o Dart (FFI) espera
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 AppDir/usr/lib/libsqlite3.so
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 AppDir/usr/lib/libsqlite3.so.0

          # 3. Copia o bundle gerado pelo Flutter 
          # (direto na raiz do AppDir, acompanhando a lógica do AppRun)
          cp -r build/linux/x64/release/bundle/* AppDir/

          # 4. Padroniza o nome do executável para evitar problemas de case sensitivity
          if [ -f "AppDir/SESI_Downloader" ]; then
            mv AppDir/SESI_Downloader AppDir/sesi_downloader
          fi
          if [ -f "AppDir/Sesi_downloader" ]; then
            mv AppDir/Sesi_downloader AppDir/sesi_downloader
          fi

          # 5. Configura ícone
          if [ -f "linux/runner/resources/application_icon.png" ]; then
            cp linux/runner/resources/application_icon.png AppDir/sesi_downloader.png
          else
            wget -q -O AppDir/sesi_downloader.png https://storage.googleapis.com/cms-storage-bucket/0dbfcc7a59cd1cf16282.png
          fi
          convert AppDir/sesi_downloader.png -resize 256x256! AppDir/sesi_downloader.png

          # 6. Cria o arquivo .desktop
          cat > AppDir/sesi_downloader.desktop <<EOF
          [Desktop Entry]
          Name=SESI Downloader
          Exec=sesi_downloader
          Icon=sesi_downloader
          Type=Application
          Categories=Utility;Network;
          EOF

          # 7. Criar script AppRun personalizado (O Pulo do Gato)
          cat > AppDir/AppRun <<EOF
          #!/bin/sh

          # Pega o diretório onde o AppImage está montado
          HERE="\$(dirname "\$(readlink -f "\${0}")")"

          # Adiciona a pasta interna usr/lib ao caminho de busca de bibliotecas
          export LD_LIBRARY_PATH="\${HERE}/usr/lib:\$LD_LIBRARY_PATH"

          # Executa o binário do Flutter
          exec "\${HERE}/sesi_downloader" "\$@"
          EOF

          chmod +x AppDir/AppRun

          # 8. Gera o AppImage usando appimagetool extraído
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract

          ARCH=x86_64 ./squashfs-root/AppRun AppDir "sesi_downloader-v1.0.${{ github.run_number }}-linux-x86_64.AppImage"

          # 9. Limpeza
          rm appimagetool-x86_64.AppImage
          rm -rf squashfs-root

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: sesi_downloader-v1.0.${{ github.run_number }}-linux-x86_64.AppImage

      # --- BUILD WINDOWS ---
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Build iss script
        if: matrix.os == 'windows-latest'
        run: dart run inno_bundle:build --no-app --release --no-installer

      # --- INJETAR DENO ---
      - name: Add Deno install command to ISS
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $issPath = "build\windows\x64\installer\Release\inno-script.iss"
          $runSection = @"

          [Run]
          Filename: "powershell.exe"; Parameters: "-NoProfile -ExecutionPolicy Bypass -Command ""iwr https://deno.land/install.ps1 -useb | iex"""; Flags: runhidden waituntilterminated; StatusMsg: "Instalando dependencias (Deno)..."
          "@
          Add-Content -Path $issPath -Value $runSection

      - name: Output config into GitHub output
        if: matrix.os == 'windows-latest'
        id: envs
        run: echo $(dart run inno_bundle:build --envs --no-hf) | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        if: matrix.os == 'windows-latest'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: ./build/windows/x64/installer/Release/inno-script.iss

      - name: Prepare Windows Artifacts
        if: matrix.os == 'windows-latest'
        run: |
          Move-Item -Path "build\windows\x64\installer\Release\*.exe" -Destination "sesi_downloader-v1.0.${{ github.run_number }}-windows-x86_64.exe"

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            sesi_downloader-v1.0.${{ github.run_number }}-windows-x86_64.exe
            sesi_downloader-v1.0.${{ github.run_number }}-windows-x86_64-portable.zip

  # ===================================================
  # JOB 2: RELEASE
  # ===================================================
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          merge-multiple: true

      - name: Generate Release Info
        id: info
        run: |
          echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

          echo "### 🚀 Build v1.0.${{ github.run_number }}" > release_body.md
          echo "" >> release_body.md
          echo "**Commit:** ${{ github.sha }}" >> release_body.md
          echo "📝 **Mensagem:**" >> release_body.md
          echo "${{ github.event.head_commit.message }}" >> release_body.md

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.info.outputs.VERSION }}
          name: Release ${{ steps.info.outputs.VERSION }}
          bodyFile: release_body.md
          artifacts: "sesi_downloader-*-linux-x86_64.AppImage,sesi_downloader-*-windows-x86_64.exe,sesi_downloader-*-windows-x86_64-portable.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
