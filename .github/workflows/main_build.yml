name: Build & Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsqlite3-dev libfuse2 imagemagick

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Update pubspec.yaml version
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            powershell -Command "(Get-Content pubspec.yaml) -replace '^version: .*', 'version: 1.0.${{ github.run_number }}' | Set-Content pubspec.yaml"
          else
            sed -i 's/^version: .*/version: 1.0.${{ github.run_number }}/g' pubspec.yaml
          fi

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      # --- BUILD LINUX ---
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --release

      - name: Create AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          cat > sesi_downloader.desktop <<EOF
          [Desktop Entry]
          Name=SESI Downloader
          Exec=sesi_downloader
          Icon=sesi_downloader
          Type=Application
          Categories=Utility;Network;
          EOF
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --executable AppDir/usr/bin/sesi_downloader --desktop-file sesi_downloader.desktop --output appimage
          mv SESI_Downloader*.AppImage sesi_downloader-v1.0.${{ github.run_number }}-linux-x86_64.AppImage

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: sesi_downloader-v1.0.${{ github.run_number }}-linux-x86_64.AppImage

      # --- BUILD WINDOWS ---
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release

      - name: Build Installer (Inno Bundle)
        if: matrix.os == 'windows-latest'
        run: |
          choco install innosetup -y
          dart run inno_bundle
          # Renomeia para um padrão consistente que o Release Job vai encontrar
          mv bin/SESI_Downloader_Setup.exe bin/sesi_downloader-v1.0.${{ github.run_number }}-windows-x86_64.exe

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: bin\sesi_downloader-v1.0.${{ github.run_number }}-windows-x86_64.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          merge-multiple: true

      - name: Generate Release Info
        id: info
        run: |
          echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "### 🚀 Build v1.0.${{ github.run_number }}" > release_body.md
          echo "" >> release_body.md
          echo "**Commit:** ${{ github.sha }}" >> release_body.md
          echo "📝 **Mensagem:**" >> release_body.md
          echo "${{ github.event.head_commit.message }}" >> release_body.md

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.info.outputs.VERSION }}
          name: Release ${{ steps.info.outputs.VERSION }}
          bodyFile: release_body.md
          # CORREÇÃO: Usamos o nome exato dos arquivos que subimos nos uploads anteriores
          artifacts: "sesi_downloader-v1.0.${{ github.run_number }}-linux-x86_64.AppImage,sesi_downloader-v1.0.${{ github.run_number }}-windows-x86_64.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
